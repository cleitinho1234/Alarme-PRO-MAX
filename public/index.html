<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini-Zap</title>

<style>
body {
  font-family: Arial;
  background: #e5ddd5;
  margin: 0;
}

/* TELAS */
.screen {
  display: none;
}

.screen.active {
  display: block;
}

/* CONTATOS */
#contacts div {
  padding: 15px;
  background: #fff;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
}

/* CHAT FULLSCREEN */
#chatScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #efeae2;
  flex-direction: column;
}

/* só aparece quando ativo */
#chatScreen.active {
  display: flex;
}

/* TOPO CHAT */
.chat-header {
  background: #075e54;
  color: white;
  padding: 15px;
  display: flex;
  align-items: center;
}

.chat-header button {
  margin-right: 10px;
}

/* MENSAGENS */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

/* MENSAGEM */
.message {
  display: flex;
  margin: 5px 0;
}

.me {
  justify-content: flex-end;
}

.other {
  justify-content: flex-start;
}

.bubble {
  padding: 10px;
  border-radius: 10px;
  max-width: 70%;
}

.me .bubble {
  background: #dcf8c6;
}

.other .bubble {
  background: white;
}

/* INPUT FIXO */
.chat-input {
  display: flex;
  padding: 10px;
  background: #f0f0f0;
}

.chat-input input {
  flex: 1;
  padding: 10px;
}

.chat-input button {
  width: 80px;
}
</style>
</head>

<body>

<!-- TELA CONTATOS -->
<div id="contactsScreen" class="screen active">

<h2>Contatos</h2>

<input type="text" id="addUserId" placeholder="ID do amigo">
<button id="addFriendBtn">Adicionar</button>

<div id="contacts"></div>

</div>

<!-- TELA CHAT -->
<div id="chatScreen" class="screen">

<div class="chat-header">
  <button onclick="voltar()">⬅</button>
  <span id="chatName"></span>
</div>

<div id="messages"></div>

<div class="chat-input">
  <input type="text" id="messageText" placeholder="Digite sua mensagem">
  <button id="sendMessageBtn">Enviar</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
