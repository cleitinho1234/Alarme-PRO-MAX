<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini-Zap</title>

<style>
body {
  font-family: Arial;
  background: #e5ddd5;
  margin: 0;
  padding: 10px;
  max-width: 600px;
  margin: auto;
}

/* inputs */
input, button, select {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  font-size: 16px;
  box-sizing: border-box;
}

/* perfil */
#profilePreview {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  margin-top: 10px;
}

/* contatos */
#contacts div {
  padding: 10px;
  background: #ddd;
  margin-bottom: 5px;
  border-radius: 5px;
  cursor: pointer;
}

/* chat */
#messages {
  height: 300px;
  overflow-y: scroll;
  background: #ece5dd;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

/* mensagem */
.message {
  display: flex;
  margin-bottom: 10px;
  align-items: flex-end;
}

.me {
  justify-content: flex-end;
}

.other {
  justify-content: flex-start;
}

/* bolha */
.bubble {
  max-width: 70%;
  padding: 10px;
  border-radius: 10px;
  font-size: 14px;
}

.me .bubble {
  background: #dcf8c6;
}

.other .bubble {
  background: #fff;
}

/* foto */
.avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  margin: 0 5px;
}
</style>
</head>

<body>

<h2>Seu Perfil</h2>

<form id="profileForm">
  <input type="text" id="username" placeholder="Seu nome">
  <input type="file" id="profilePic" accept="image/*">
  <button type="submit">Salvar Perfil</button>
</form>

<img id="profilePreview" src="">

<p>Seu ID: <span id="userIdDisplay"></span></p>

<hr>

<h2>Contatos</h2>
<input type="text" id="addUserId" placeholder="ID do amigo">
<button id="addFriendBtn">Adicionar</button>

<div id="contacts"></div>

<hr>

<h2>Chat</h2>

<div id="messages"></div>

<input type="text" id="messageText" placeholder="Digite sua mensagem">
<select id="friendSelect"></select>
<button id="sendMessageBtn">Enviar</button>

<script src="script.js"></script>

</body>
    </html>
