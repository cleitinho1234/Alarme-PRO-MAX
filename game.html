<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Modo Jogo PRO</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#111;
color:white;
}

/* HUD */
#hud{
position:fixed;
top:10px;
left:10px;
background:black;
padding:10px;
border-radius:8px;
z-index:10;
}

/* mensagem grande */
#msg{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
font-weight:bold;
opacity:0;
transition:1s;
}

/* área jogo */
#game{
position:relative;
width:100vw;
height:100vh;
}

/* palavras */
.word{
position:absolute;
font-size:26px;
font-weight:bold;
color:#00ff88;
}

/* palavra ativa */
.active{
color:yellow;
}

/* chão */
#ground{
position:absolute;
bottom:0;
width:100%;
height:5px;
background:red;
}

</style>

</head>

<body>

<div id="hud">
❤️ Vida: <span id="life">10</span><br>
⏱️ Tempo: <span id="time">0</span>s<br>
🚀 Nível: <span id="level">Fácil</span>
</div>

<div id="msg"></div>

<div id="game"></div>
<div id="ground"></div>

<script>

const game = document.getElementById("game")
const lifeEl = document.getElementById("life")
const timeEl = document.getElementById("time")
const levelEl = document.getElementById("level")
const msgEl = document.getElementById("msg")

let words = []
let life = 10
let time = 0

let speed = 0.4
let spawnRate = 2500

let currentInput = ""

/* banco de palavras */
const wordList = [
"casa","gato","tempo","codigo","teclado","rapido","foco",
"energia","disciplina","javascript","computador","desafio",
"velocidade","pratica","evolucao","jogador","controle"
]

/* mensagem na tela */
function showMessage(text){
msgEl.innerText = text
msgEl.style.opacity = 1

setTimeout(()=>{
msgEl.style.opacity = 0
},2000)
}

/* spawn palavra */
function spawnWord(){

let w = document.createElement("div")
w.className="word"

let word = wordList[Math.floor(Math.random()*wordList.length)]

w.innerText = word

w.x = Math.random() * (window.innerWidth - 150)
w.y = 0

w.style.left = w.x + "px"
w.style.top = w.y + "px"

game.appendChild(w)

words.push({el:w, text:word, x:w.x, y:w.y})

}

/* loop */
function update(){

words.forEach((obj,i)=>{

obj.y += speed
obj.el.style.top = obj.y + "px"

/* chegou no chão */
if(obj.y > window.innerHeight - 30){

obj.el.remove()
words.splice(i,1)

life--
lifeEl.innerText = life

}

})

if(life <= 0){
alert("GAME OVER")
location.reload()
}

requestAnimationFrame(update)
}

update()

/* digitação */
document.addEventListener("keydown",(e)=>{

let key = e.key.toLowerCase()

if(key.length === 1){
currentInput += key
}

/* verifica palavras */
words.forEach((obj,i)=>{

if(obj.text.startsWith(currentInput)){
obj.el.classList.add("active")
}else{
obj.el.classList.remove("active")
}

/* acertou palavra */
if(currentInput === obj.text){
obj.el.remove()
words.splice(i,1)
currentInput = ""
}

})

/* reset se errar muito */
if(currentInput.length > 12){
currentInput = ""
}

})

/* spawn contínuo */
setInterval(spawnWord, spawnRate)

/* tempo + dificuldade (MAIS LENTO) */
setInterval(()=>{

time++
timeEl.innerText = time

/* 🐢 FÁCIL (0-30s) */
if(time === 30){
speed = 0.8
spawnRate = 2000
levelEl.innerText="Médio"
showMessage("⚡ Agora modo MÉDIO")
}

/* 😐 MÉDIO (30-70s) */
if(time === 70){
speed = 1.5
spawnRate = 1400
levelEl.innerText="Difícil"
showMessage("🔥 Agora modo DIFÍCIL")
}

/* 🔥 progressivo */
if(time > 70){
speed += 0.01
}

},1000)

</script>

</body>
</html>
