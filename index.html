<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alarme Moderno</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h1 {
  font-size: 28px;
}

input, button, select {
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  background: #22c55e;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

#clock {
  font-size: 40px;
  margin: 20px 0;
}

</style>
</head>
<body>

<div class="container">
  <h1>⏰ Alarme PRO</h1>
  <div id="clock"></div>

  <input type="time" id="alarmTime">
  <br>

  <label>Volume:</label>
  <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5">

  <br>

  <label>Snooze (min):</label>
  <select id="snooze">
    <option value="5">5</option>
    <option value="9" selected>9</option>
    <option value="15">15</option>
  </select>

  <br>

  <button onclick="setAlarm()">Ativar Alarme</button>
  <button onclick="stopAlarm()">Parar</button>
  <button onclick="snoozeAlarm()">Soneca</button>

  <p id="status"></p>
</div>

<audio id="alarmSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
let alarmTime = null;
let alarmTimeout = null;
let isRinging = false;

function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText = now.toLocaleTimeString();
}
setInterval(updateClock, 1000);

function setAlarm() {
  const input = document.getElementById("alarmTime").value;
  if (!input) return;

  const now = new Date();
  const [hours, minutes] = input.split(":");

  const alarm = new Date();
  alarm.setHours(hours);
  alarm.setMinutes(minutes);
  alarm.setSeconds(0);

  if (alarm < now) {
    alarm.setDate(alarm.getDate() + 1);
  }

  const timeToAlarm = alarm - now;

  alarmTime = alarm;

  alarmTimeout = setTimeout(triggerAlarm, timeToAlarm);

  document.getElementById("status").innerText = "Alarme definido para " + alarm.toLocaleTimeString();
}

function triggerAlarm() {
  const sound = document.getElementById("alarmSound");
  sound.volume = 0.1;
  sound.loop = true;
  sound.play();

  isRinging = true;

  // volume progressivo
  let vol = 0.1;
  const interval = setInterval(() => {
    if (vol < document.getElementById("volume").value && isRinging) {
      vol += 0.1;
      sound.volume = vol;
    } else {
      clearInterval(interval);
    }
  }, 1000);
}

function stopAlarm() {
  const sound = document.getElementById("alarmSound");
  sound.pause();
  sound.currentTime = 0;
  isRinging = false;
  document.getElementById("status").innerText = "Alarme parado";
}

function snoozeAlarm() {
  if (!isRinging) return;

  stopAlarm();

  const minutes = document.getElementById("snooze").value;
  const now = new Date();

  const snoozeTime = new Date(now.getTime() + minutes * 60000);

  alarmTimeout = setTimeout(triggerAlarm, minutes * 60000);

  document.getElementById("status").innerText = "Soneca até " + snoozeTime.toLocaleTimeString();
}
</script>

</body>
</html>
