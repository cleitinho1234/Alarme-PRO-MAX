<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jogo Melhorado</title>

<style>

body{
margin:0;
overflow:hidden;
background:linear-gradient(#6ec1e4,#87CEEB);
}

/* câmera zoom */
#camera{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
}

#world{
position:absolute;
transform:scale(1.3);
transform-origin:0 0;
}

/* jogador */
#player{
position:absolute;
transform:scale(1.5);
}

/* inimigo melhorado */
.enemy{
position:absolute;
width:40px;
height:40px;
background:#b30000;
border:3px solid black;
}

.enemy::after{
content:"";
position:absolute;
width:8px;
height:8px;
background:white;
top:10px;
left:10px;
}

/* tiro melhor */
.fire{
position:absolute;
width:12px;
height:12px;
background:yellow;
border-radius:50%;
box-shadow:0 0 10px orange, 0 0 20px red;
}

/* rastro */
.trail{
position:absolute;
width:8px;
height:8px;
background:orange;
border-radius:50%;
opacity:0.5;
}

/* explosão */
.explosion{
position:absolute;
width:30px;
height:30px;
border-radius:50%;
background:radial-gradient(circle,yellow,red);
animation:boom 0.4s forwards;
}

@keyframes boom{
to{transform:scale(3);opacity:0;}
}

/* HUD */
#life{
position:fixed;
top:10px;
left:10px;
background:black;
color:white;
padding:10px;
font-weight:bold;
}

/* chão */
.ground{
position:absolute;
top:600px;
width:3000px;
height:200px;
background:#4b2e05;
}

</style>

</head>

<body>

<div id="life">❤️ Vida: 100</div>

<div id="camera">
<div id="world">

<div id="player">
<img src="asa.png" style="position:absolute; top:30px; width:80px;">
<img src="asa.png" style="position:absolute; top:30px; width:80px; transform:scaleX(-1);">

<div style="width:40px;height:40px;background:#f1c27d;border:2px solid black;"></div>
<div style="width:40px;height:50px;background:#3cb043;border:2px solid black;"></div>

</div>

<div class="ground"></div>

</div>
</div>

<script>

let x=300,y=400
let keys={}
let life=100
let direction="right"

const player=document.getElementById("player")
const world=document.getElementById("world")
const lifeUI=document.getElementById("life")

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true
if(e.key==="Shift") shoot()
})

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false
})

/* inimigos */
let enemies=[]
setInterval(()=>{
let e=document.createElement("div")
e.className="enemy"
e.x=x+Math.random()*400-200
e.y=400
world.appendChild(e)
enemies.push(e)
},1500)

/* tiro melhor */
function shoot(){

let fire=document.createElement("div")
fire.className="fire"

let fx=x,fy=y
world.appendChild(fire)

let dir=direction

function move(){

/* rastro */
let trail=document.createElement("div")
trail.className="trail"
trail.style.left=fx+"px"
trail.style.top=fy+"px"
world.appendChild(trail)
setTimeout(()=>trail.remove(),200)

if(dir==="right") fx+=12
if(dir==="left") fx-=12

fire.style.left=fx+"px"
fire.style.top=fy+"px"

/* colisão */
enemies.forEach((e,i)=>{
if(Math.abs(fx-e.x)<30){
let boom=document.createElement("div")
boom.className="explosion"
boom.style.left=e.x+"px"
boom.style.top=e.y+"px"
world.appendChild(boom)

setTimeout(()=>boom.remove(),400)

e.remove()
enemies.splice(i,1)
fire.remove()
}
})

requestAnimationFrame(move)
}

move()
}

/* loop */
function loop(){

if(keys["a"]){ x-=5; direction="left" }
if(keys["d"]){ x+=5; direction="right" }

player.style.left=x+"px"
player.style.top=y+"px"

/* câmera */
world.style.left = -x + window.innerWidth/2 + "px"

enemies.forEach(e=>{
if(e.x < x) e.x+=1
if(e.x > x) e.x-=1
e.style.left=e.x+"px"
e.style.top=e.y+"px"

if(Math.abs(e.x-x)<30){
life-=0.3
}
})

lifeUI.innerText="❤️ Vida: "+Math.floor(life)

requestAnimationFrame(loop)
}

loop()

</script>

</body>
</html>
