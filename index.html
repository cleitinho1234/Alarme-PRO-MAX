<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alarme PRO MAX</title>

<style>
body {
    background:#0f172a;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:20px;
}

button {
    padding:12px;
    margin:5px;
    border:none;
    border-radius:10px;
}

#lista { margin-top:20px; }

.alarm {
    background:#1e293b;
    padding:15px;
    margin:10px auto;
    border-radius:12px;
    width:260px;
}

#parar { background:red; display:none; }
#soneca { background:orange; display:none; }

.modal {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.box {
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}
</style>

</head>

<body>

<h1>⏰ Alarme PRO MAX</h1>

<button onclick="abrirModal()">+ Novo</button> <button id="parar" onclick="pararAlarme()">PARAR</button> <button id="soneca" onclick="soneca()">Soneca +5min</button>

<div id="lista"></div>

<div id="modal" class="modal">
<div class="box">
<input type="text" id="hora" placeholder="HH:MM"><br><br>
<input type="file" id="audioFile" accept="audio/*"><br><br>
<button onclick="salvarAlarme()">Salvar</button>
</div>
</div>

<script>
let alarmes = JSON.parse(localStorage.getItem("alarmes")) || [];

let tocando=null;
let repetindo=false;
let timeoutAtual=null;
let ultimoDisparo="";
let alarmeAtualIndex=null;

function salvar(){
    localStorage.setItem("alarmes", JSON.stringify(alarmes));
}

// FORMATO HORA
document.getElementById("hora").addEventListener("input", e=>{
    let v=e.target.value.replace(/\D/g,"");
    if(v.length>=3) v=v.slice(0,2)+":"+v.slice(2,4);
    e.target.value=v;
});

// MODAL
function abrirModal(){
    document.getElementById("modal").style.display="flex";
}

// CRIAR
function salvarAlarme(){
    let hora=document.getElementById("hora").value;
    let file=document.getElementById("audioFile").files[0];

    if(!hora) return;

    if(file){
        let r=new FileReader();
        r.onload=e=>{
            alarmes.push({hora,audio:e.target.result,ativo:true});
            salvar(); render();
        }
        r.readAsDataURL(file);
    } else {
        alarmes.push({hora,audio:"",ativo:true});
        salvar(); render();
    }
}

// RENDER
function render(){
    let lista=document.getElementById("lista");
    lista.innerHTML="";
    alarmes.forEach((a,i)=>{
        lista.innerHTML+=`
        <div class="alarm">
        <h3>${a.hora}</h3>
        <button onclick="toggle(${i})">On/Off</button>
        <button onclick="remover(${i})">X</button>
        </div>`;
    });
}

function toggle(i){
    alarmes[i].ativo=!alarmes[i].ativo;
    salvar(); render();
}

function remover(i){
    alarmes.splice(i,1);
    salvar(); render();
}

// 🔴 PARAR
function pararAlarme(){
    repetindo=false;

    if(tocando){
        tocando.pause();
        tocando.currentTime=0;
        tocando=null;
    }

    if(timeoutAtual){
        clearTimeout(timeoutAtual);
        timeoutAtual=null;
    }

    if(alarmeAtualIndex!=null){
        alarmes[alarmeAtualIndex].ativo=false;
        salvar(); render();
    }

    document.getElementById("parar").style.display="none";
    document.getElementById("soneca").style.display="none";
}

// 🟠 SONECA +5 MIN
function soneca(){
    let agora=new Date();

    agora.setMinutes(agora.getMinutes()+5);

    let h = agora.getHours().toString().padStart(2,"0");
    let m = agora.getMinutes().toString().padStart(2,"0");

    let novaHora = h+":"+m;

    let audio = "";

    if(alarmeAtualIndex!=null){
        audio = alarmes[alarmeAtualIndex].audio;
        alarmes[alarmeAtualIndex].ativo=false;
    }

    alarmes.push({
        hora:novaHora,
        audio:audio,
        ativo:true
    });

    salvar();
    render();

    pararAlarme();
}

// ⏰ SISTEMA
setInterval(()=>{
let d=new Date();
let atual=d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0");

alarmes.forEach((a,i)=>{
if(a.hora===atual && a.ativo && !repetindo && ultimoDisparo!==atual){

ultimoDisparo=atual;
repetindo=true;
alarmeAtualIndex=i;

document.getElementById("parar").style.display="inline-block";
document.getElementById("soneca").style.display="inline-block";

function tocar(){
if(!repetindo) return;

tocando=new Audio(a.audio||"https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");
tocando.play();

timeoutAtual=setTimeout(()=>{
if(tocando){
tocando.pause();
tocando.currentTime=0;
tocando=null;
}
tocar();
},30000);
}

tocar();
}
});
},1000);

render();
</script>

</body>
</html>
