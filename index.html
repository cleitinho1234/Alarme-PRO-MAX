<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo Completo</title>

<style>

body{
margin:0;
overflow:hidden;
background:#87CEEB;
}

/* mundo */
#world{
position:absolute;
width:3000px;
height:1200px;
}

/* chão */
.ground{
position:absolute;
bottom:0;
width:100%;
height:150px;
background:#5a3d1e;
}

/* HUD */
#life{
position:fixed;
top:10px;
left:10px;
background:black;
color:white;
padding:10px;
font-weight:bold;
z-index:10;
}

/* jogador */
#player{
position:absolute;
display:flex;
flex-direction:column;
align-items:center;
}

/* asas */
.wings{
position:absolute;
top:35px;
width:120px;
display:flex;
justify-content:space-between;
z-index:0;
filter:drop-shadow(0 0 8px #00ff88);
}

.wing{ width:60px; }
.wing.right{ transform:scaleX(-1); }

/* corpo */
.head,.body,.legs{ z-index:2; position:relative; }

.head{
width:40px;height:40px;background:#f1c27d;border:2px solid black;
}
.eye{width:6px;height:6px;background:black;border-radius:50%;position:absolute;top:12px;}
.eye.left{left:8px;} .eye.right{right:8px;}
.mouth{width:14px;height:6px;border-bottom:3px solid black;position:absolute;bottom:8px;left:50%;transform:translateX(-50%);}

.body{width:40px;height:50px;background:#3cb043;border:2px solid black;}

.arm{width:12px;height:45px;background:#f1c27d;border:2px solid black;position:absolute;top:0;}
.arm.left{left:-16px;} .arm.right{right:-16px;}

.legs{display:flex;gap:10px;}
.leg{width:12px;height:40px;background:#1e3d59;border:2px solid black;}

/* inimigos */
.enemy{
position:absolute;
width:40px;
height:40px;
background:red;
}

/* tiro */
.fire{
position:absolute;
width:20px;
height:20px;
border-radius:50%;
background:radial-gradient(circle, yellow, red);
}

/* explosão */
.explosion{
position:absolute;
width:40px;
height:40px;
border-radius:50%;
background:radial-gradient(circle, yellow, red);
animation:boom 0.3s forwards;
}

@keyframes boom{
to{ transform:scale(2); opacity:0; }
}

</style>

</head>

<body>

<div id="life">❤️ Vida: 100</div>

<div id="world">

<div id="player">

<div class="wings">
<img src="asa.png" class="wing">
<img src="asa.png" class="wing right">
</div>

<div class="head">
<div class="eye left"></div>
<div class="eye right"></div>
<div class="mouth"></div>
</div>

<div class="body">
<div class="arm left"></div>
<div class="arm right"></div>
</div>

<div class="legs">
<div class="leg"></div>
<div class="leg"></div>
</div>

</div>

<div class="ground"></div>

</div>

<script>

const player = document.getElementById("player")
const world = document.getElementById("world")
const lifeUI = document.getElementById("life")

let x=300, y=500
let vx=0, vy=0
let speed=5
let gravity=0.5
let jumping=false
let flying=false
let direction="right"
let keys={}
let life=100

/* SOM */
function beep(freq){
let ctx=new AudioContext()
let osc=ctx.createOscillator()
osc.frequency.value=freq
osc.connect(ctx.destination)
osc.start()
setTimeout(()=>osc.stop(),100)
}

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true

if(e.key==="Shift") shoot()

if(e.key===" "){
if(!jumping){
vy=-10
jumping=true
}
flying=true
}
})

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false
if(e.key===" ") flying=false
})

/* inimigos */
let enemies=[]

function spawnEnemy(){
let e=document.createElement("div")
e.className="enemy"

e.x = x + (Math.random()*600 - 300)
e.y = 500

world.appendChild(e)
enemies.push(e)
}

setInterval(spawnEnemy,2000)

/* tiro */
function shoot(){
beep(600)

let fire=document.createElement("div")
fire.className="fire"

let fx=x, fy=y
world.appendChild(fire)

let dir=direction

function move(){

if(dir==="right") fx+=12
if(dir==="left") fx-=12
if(dir==="up") fy-=12
if(dir==="down") fy+=12

fire.style.left=fx+"px"
fire.style.top=fy+"px"

enemies.forEach((e,i)=>{
if(Math.abs(fx-e.x)<30 && Math.abs(fy-e.y)<30){

let boom=document.createElement("div")
boom.className="explosion"
boom.style.left=e.x+"px"
boom.style.top=e.y+"px"
world.appendChild(boom)

setTimeout(()=>boom.remove(),300)

e.remove()
enemies.splice(i,1)
fire.remove()
}
})

requestAnimationFrame(move)
}

move()
}

/* LOOP */
function loop(){

/* movimento */
if(keys["a"]){ vx=-speed; direction="left" }
else if(keys["d"]){ vx=speed; direction="right" }
else vx=0

if(keys["w"]) direction="up"
if(keys["s"]) direction="down"

/* voo */
if(flying) vy -= 0.6

/* gravidade */
vy += gravity

x += vx
y += vy

/* chão */
if(y > 500){
y=500
vy=0
jumping=false
}

/* câmera */
world.style.left = -x + window.innerWidth/2 + "px"
world.style.top  = -y + window.innerHeight/2 + "px"

player.style.left=x+"px"
player.style.top=y+"px"

/* inimigos */
enemies.forEach(e=>{

if(e.x < x) e.x+=1.5
if(e.x > x) e.x-=1.5

e.style.left=e.x+"px"
e.style.top=e.y+"px"

/* dano */
if(Math.abs(e.x-x)<30 && Math.abs(e.y-y)<30){
life -= 0.2
}
})

lifeUI.innerText="❤️ Vida: "+Math.floor(life)

if(life <= 0){
alert("GAME OVER")
location.reload()
}

requestAnimationFrame(loop)
}

loop()

</script>

</body>
</html>
