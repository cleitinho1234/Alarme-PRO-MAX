<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Despertador Simples</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 350px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
}

#clock {
  font-size: 42px;
  margin: 20px 0;
}

button, input {
  margin: 8px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.dark {
  background: black !important;
  color: #22c55e;
}
</style>
</head>
<body>

<div class="container" id="app">
  <h2>⏰ Despertador</h2>

  <!-- Relógio -->
  <div id="clock"></div>

  <!-- Definir alarme -->
  <input type="time" id="alarmTime"><br>

  <!-- Botões -->
  <button onclick="toggleAlarm()">Ligar / Desligar</button>
  <button onclick="snooze()">Soneca</button>
  <button onclick="toggleLight()">Luz</button>

  <p id="status"></p>
</div>

<!-- Som simples -->
<audio id="sound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
let alarmTime = null;
let alarmOn = false;
let ringing = false;

function updateClock() {
  const now = new Date();
  const time = now.toLocaleTimeString();
  document.getElementById("clock").innerText = time;

  // comparação correta (hora e minuto)
  const currentHM = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

  if (alarmOn && alarmTime === currentHM) {
    playAlarm();
  }
}

setInterval(updateClock, 1000);

function toggleAlarm() {
  const input = document.getElementById("alarmTime").value;

  if (!alarmOn) {
    if (!input) return;
    alarmTime = input;
    alarmOn = true;
    document.getElementById("status").innerText = "Alarme ligado para " + alarmTime;
  } else {
    alarmOn = false;
    stopAlarm();
    document.getElementById("status").innerText = "Alarme desligado";
  }
}

function playAlarm() {
  if (ringing) return;

  const sound = document.getElementById("sound");
  sound.loop = true;
  sound.play();
  ringing = true;
}

function stopAlarm() {
  const sound = document.getElementById("sound");
  sound.pause();
  sound.currentTime = 0;
  ringing = false;
}

function snooze() {
  if (!ringing) return;

  stopAlarm();

  const now = new Date();
  now.setMinutes(now.getMinutes() + 5);

  alarmTime = now.toTimeString().substring(0,5);
  alarmOn = true;

  document.getElementById("status").innerText = "Soneca ativada até " + alarmTime;
}

function toggleLight() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
