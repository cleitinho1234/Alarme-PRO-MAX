<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personagem com asas de anjo</title>

<style>

body{
margin:0;
overflow:hidden;
background:#87CEEB;
}

/* jogador */

#player{
position:absolute;
left:300px;
top:200px;
display:flex;
flex-direction:column;
align-items:center;
}

/* ===== ASAS REALISTAS ===== */

.wings{
position:absolute;
top:0px;
width:140px;
display:flex;
justify-content:space-between;
pointer-events:none;
}

/* cada asa */
.wing{
position:relative;
width:60px;
height:80px;
animation:flap 0.6s infinite ease-in-out alternate;
}

/* penas */
.feather{
position:absolute;
width:22px;
height:45px;
background:white;
border:2px solid green;
border-radius:50%;
}

/* esquerda */
.wing.left .feather:nth-child(1){
left:25px; top:0; transform:rotate(-10deg);
}
.wing.left .feather:nth-child(2){
left:15px; top:15px; transform:rotate(-20deg);
}
.wing.left .feather:nth-child(3){
left:5px; top:30px; transform:rotate(-30deg);
}
.wing.left .feather:nth-child(4){
left:-5px; top:45px; transform:rotate(-40deg);
}

/* direita */
.wing.right .feather:nth-child(1){
right:25px; top:0; transform:rotate(10deg);
}
.wing.right .feather:nth-child(2){
right:15px; top:15px; transform:rotate(20deg);
}
.wing.right .feather:nth-child(3){
right:5px; top:30px; transform:rotate(30deg);
}
.wing.right .feather:nth-child(4){
right:-5px; top:45px; transform:rotate(40deg);
}

/* animação */
@keyframes flap{
from{ transform:translateY(0px) rotate(0deg); }
to{ transform:translateY(-6px) rotate(6deg); }
}

/* cabeça */

.head{
width:40px;
height:40px;
background:#f1c27d;
border:2px solid black;
position:relative;
}

.eye{
width:6px;
height:6px;
background:black;
border-radius:50%;
position:absolute;
top:12px;
}

.eye.right{ right:8px; }
